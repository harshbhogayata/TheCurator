name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: curator-app/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: curator-app/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-test-secret-key
          DEBUG: "true"
          DATABASE_URL: sqlite:///db.sqlite3
        run: |
          python manage.py test \
            mobileapi.tests \
            users.tests \
            onboarding.tests \
            billing.tests \
            common.tests \
            --keepdb --noinput

  mobile-typecheck:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: curator-app/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: curator-app/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  maestro-smoke:
    name: Maestro E2E smoke
    runs-on: ubuntu-latest
    needs: mobile-typecheck
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: curator-app/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run smoke flows
        env:
          MAESTRO_TEST_EMAIL: ${{ secrets.MAESTRO_TEST_EMAIL }}
          MAESTRO_TEST_PASSWORD: ${{ secrets.MAESTRO_TEST_PASSWORD }}
        run: |
          if [ -z "$MAESTRO_TEST_EMAIL" ] || [ -z "$MAESTRO_TEST_PASSWORD" ]; then
            echo "Skipping Maestro: set MAESTRO_TEST_EMAIL and MAESTRO_TEST_PASSWORD repo secrets."
            exit 0
          fi
          echo "Maestro smoke requires a connected device or Maestro Cloud APK upload."
          echo "Install a preview build (com.curator.mobile) on an emulator, then re-run this job."
          maestro test .maestro/flows/auth.yaml
