[build]
builder = "NIXPACKS"

[deploy]
# Regenerate free Edge TTS narration after deploy (Railway local disk is ephemeral).
# Set TTS_PROVIDER=edge and AUDIO_STORAGE_BACKEND=local on the service.
startCommand = "python manage.py migrate --noinput && python manage.py generate_content_audio --all-missing --limit 50 || true && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
