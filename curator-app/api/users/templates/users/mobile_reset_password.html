<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password · The Curator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fbf9f3;
      --surface: #ffffff;
      --primary: #31332b;
      --primary-container: #e8e6df;
      --on-primary: #ffffff;
      --on-surface: #1c1b18;
      --on-surface-variant: #5c5b56;
      --outline: #c8c6be;
      --error-container: #f5e0e0;
      --on-error-container: #5c3838;
      --success: #2d4a31;
      --success-bg: #dce8dd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", system-ui, sans-serif;
      background: var(--bg);
      color: var(--on-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      border: 1px solid color-mix(in srgb, var(--outline) 35%, transparent);
      border-radius: 40px;
      padding: 32px 28px;
      box-shadow: 0 24px 60px rgba(49, 51, 43, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-family: "Newsreader", Georgia, serif;
      font-size: 2rem;
      font-style: italic;
      font-weight: 500;
      line-height: 1.15;
    }
    .sub {
      margin: 0 0 20px;
      color: var(--on-surface-variant);
      font-size: 0.95rem;
      line-height: 1.55;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.88rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid color-mix(in srgb, var(--outline) 55%, transparent);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 16px;
    }
    .btn {
      appearance: none;
      border: none;
      width: 100%;
      border-radius: 999px;
      padding: 16px 24px;
      font: 600 0.95rem/1.2 "Manrope", sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--primary);
      color: var(--on-primary);
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      border-radius: 20px;
      padding: 12px 14px;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .status.error { background: var(--error-container); color: var(--on-error-container); }
    .status.ok { background: var(--success-bg); color: var(--success); }
    #form[hidden] { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1 id="title">Reset your password</h1>
    <p class="sub" id="lede">
      Choose a new password for your Curator account. Tap the button after entering it — this keeps the link valid until you are ready.
    </p>
    <form id="form">
      <label for="password">New password</label>
      <input id="password" type="password" minlength="8" autocomplete="new-password" placeholder="At least 8 characters" required />
      <button type="submit" class="btn" id="submit-btn">Update password</button>
    </form>
    <p class="status" id="status" hidden></p>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {{ firebase_config_json|safe }};
    const params = new URLSearchParams(window.location.search);
    const status = params.get("status");
    const mode = params.get("mode");
    const oobCode = params.get("oobCode");
    const apiKey = params.get("apiKey") || firebaseConfig.apiKey || "";

    const form = document.getElementById("form");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const lede = document.getElementById("lede");
    const title = document.getElementById("title");
    const passwordInput = document.getElementById("password");

    function showStatus(message, kind) {
      statusEl.hidden = false;
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`;
    }

    if (status === "done") {
      title.textContent = "Password updated";
      lede.textContent = "Return to The Curator app and sign in with your new password.";
      form.hidden = true;
      showStatus("You can close this tab.", "ok");
    } else if (!oobCode || mode !== "resetPassword" || !apiKey) {
      title.textContent = "Link not valid";
      lede.textContent = "This reset link is incomplete or expired. In the app, tap Send Reset Instructions again and open only the newest email.";
      form.hidden = true;
      showStatus("Missing or invalid reset code.", "error");
    } else {
      const app = initializeApp({ ...firebaseConfig, apiKey });
      const auth = getAuth(app);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = passwordInput.value.trim();
        if (password.length < 8) {
          showStatus("Use at least 8 characters.", "error");
          return;
        }

        submitBtn.disabled = true;
        try {
          await confirmPasswordReset(auth, oobCode, password);
          form.hidden = true;
          title.textContent = "Password updated";
          lede.textContent = "All set — return to the app and sign in.";
          showStatus("Your password has been updated.", "ok");
        } catch (error) {
          submitBtn.disabled = false;
          const code = error && typeof error === "object" && "code" in error ? String(error.code) : "";
          if (code.includes("invalid-action-code") || code.includes("expired-action-code")) {
            showStatus(
              "This link expired or was already used. Request a new reset from the app and use only the newest email.",
              "error",
            );
          } else if (code.includes("weak-password")) {
            showStatus("Choose a stronger password with at least 8 characters.", "error");
          } else {
            showStatus("Could not reset right now. Request a fresh link from the app.", "error");
          }
        }
      });
    }
  </script>
</body>
</html>
