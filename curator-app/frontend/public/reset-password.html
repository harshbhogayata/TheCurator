<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password · The Curator</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fbf9f3;
        --surface: #ffffff;
        --text: #31332b;
        --muted: #5e6056;
        --accent: #0e0e0b;
        --accent-fg: #e9e8e3;
        --error: #9a4f4f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 480px);
        background: var(--surface);
        border-radius: 28px;
        padding: 32px 28px;
        box-shadow: 0 24px 60px rgba(14, 14, 11, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
        font-weight: 500;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.55;
        color: var(--muted);
        font-family: system-ui, sans-serif;
        font-size: 0.95rem;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-family: system-ui, sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text);
      }
      input {
        width: 100%;
        border: 1px solid rgba(94, 96, 86, 0.25);
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 1rem;
        font-family: system-ui, sans-serif;
        margin-bottom: 16px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: system-ui, sans-serif;
        background: var(--accent);
        color: var(--accent-fg);
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      .status {
        margin-top: 16px;
        font-family: system-ui, sans-serif;
        font-size: 0.92rem;
      }
      .status.error { color: var(--error); }
      .status.ok { color: #3f6d4a; }
      a { color: inherit; }
      #form[hidden] { display: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>Reset your password</h1>
      <p id="lede">
        Choose a new password for your Curator account. This extra step keeps email apps from
        using the link before you are ready.
      </p>
      <form id="form">
        <label for="password">New password</label>
        <input id="password" type="password" minlength="8" autocomplete="new-password" placeholder="At least 8 characters" required />
        <button id="reset-btn" type="submit">Update password</button>
      </form>
      <p class="status" id="status" hidden></p>
    </main>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

      const params = new URLSearchParams(window.location.search);
      const status = params.get("status");
      const mode = params.get("mode");
      const oobCode = params.get("oobCode");
      const apiKey = params.get("apiKey");
      const form = document.getElementById("form");
      const button = document.getElementById("reset-btn");
      const passwordInput = document.getElementById("password");
      const statusEl = document.getElementById("status");
      const lede = document.getElementById("lede");

      function showStatus(message, kind) {
        statusEl.hidden = false;
        statusEl.textContent = message;
        statusEl.className = `status ${kind}`;
      }

      if (status === "done") {
        lede.textContent = "Your password is updated. Return to The Curator app and sign in with your new password.";
        form.hidden = true;
        showStatus("You can close this tab.", "ok");
      } else if (!oobCode || mode !== "resetPassword") {
        lede.textContent = "This reset link is incomplete or invalid. In the app, tap Send Reset Instructions again and open only the newest email.";
        form.hidden = true;
        showStatus("Missing reset code.", "error");
      } else {
        const app = initializeApp({
          apiKey: apiKey || "",
          authDomain: "thecuratorin.firebaseapp.com",
          projectId: "thecuratorin",
        });
        const auth = getAuth(app);

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const password = passwordInput.value.trim();
          if (password.length < 8) {
            showStatus("Use at least 8 characters.", "error");
            return;
          }

          button.disabled = true;
          try {
            await confirmPasswordReset(auth, oobCode, password);
            form.hidden = true;
            lede.textContent = "All set — your password has been updated.";
            showStatus("Return to the app and sign in with your new password.", "ok");
          } catch (error) {
            button.disabled = false;
            const code = error && typeof error === "object" && "code" in error ? String(error.code) : "";
            if (code.includes("invalid-action-code") || code.includes("expired-action-code")) {
              showStatus(
                "This link expired or was already used. Request a new reset from the app and use only the newest email.",
                "error",
              );
            } else if (code.includes("weak-password")) {
              showStatus("Choose a stronger password with at least 8 characters.", "error");
            } else {
              showStatus("Could not reset right now. Request a fresh link from the app.", "error");
            }
          }
        });
      }
    </script>
  </body>
</html>
