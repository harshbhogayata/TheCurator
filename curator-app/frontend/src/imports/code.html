<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#fbf9f3",
                        "on-primary-fixed": "#403f3f",
                        "on-surface": "#31332b",
                        "error": "#9e422c",
                        "on-tertiary-fixed": "#484a4a",
                        "on-primary": "#faf7f6",
                        "surface-container-highest": "#e2e3d6",
                        "on-tertiary-fixed-variant": "#656667",
                        "primary-fixed-dim": "#d6d4d3",
                        "surface-container": "#efeee5",
                        "inverse-primary": "#ffffff",
                        "on-tertiary": "#f9f9f9",
                        "on-error": "#fff7f6",
                        "surface-dim": "#d9dbcd",
                        "on-secondary-fixed-variant": "#5e5b53",
                        "tertiary-dim": "#525354",
                        "primary": "#5f5e5e",
                        "on-primary-fixed-variant": "#5c5b5b",
                        "background": "#fbf9f3",
                        "on-surface-variant": "#5e6056",
                        "on-error-container": "#742410",
                        "on-secondary-fixed": "#413f37",
                        "secondary-dim": "#55534b",
                        "error-container": "#fe8b70",
                        "on-secondary-container": "#545249",
                        "on-secondary": "#fef8ed",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#e5e2e1",
                        "on-background": "#31332b",
                        "surface-container-high": "#e9e9de",
                        "on-tertiary-container": "#5a5c5c",
                        "inverse-surface": "#0e0e0b",
                        "surface-bright": "#fbf9f3",
                        "primary-dim": "#535252",
                        "outline-variant": "#b1b3a7",
                        "on-primary-container": "#525151",
                        "secondary": "#625f56",
                        "inverse-on-surface": "#9e9d98",
                        "tertiary-fixed-dim": "#e5e5e5",
                        "secondary-fixed-dim": "#d9d4c9",
                        "outline": "#7a7c71",
                        "primary-fixed": "#e5e2e1",
                        "secondary-container": "#e7e2d7",
                        "surface-container-low": "#f5f4ec",
                        "surface-variant": "#e2e3d6",
                        "surface-tint": "#5f5e5e",

                        "error-dim": "#5c1202",
                        "tertiary-fixed": "#f3f3f4",
                        "tertiary-container": "#f3f3f4",
                        "tertiary": "#5e5f60"
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .silk-border {
            border: 1px solid rgba(177, 179, 167, 0.2);
        }
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, #ffffff 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #fbf9f3 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #ffffff 0%, transparent 50%),
                        radial-gradient(at 0% 100%, #f2f0ea 0%, transparent 50%);
            background-color: #fbf9f3;
        }
        .glass-pill {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(49, 51, 43, 0.05);
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container mesh-gradient min-h-screen">
<!-- TopAppBar Component -->
<header class="bg-white/70 dark:bg-stone-900/70 backdrop-blur-2xl fixed top-0 w-full z-50 shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-all p-2 rounded-full active:scale-95 duration-300">
<span class="material-symbols-outlined text-stone-800 dark:text-stone-100">menu</span>
</button>
<h1 class="font-newsreader italic tracking-tight text-2xl text-stone-900 dark:text-stone-50">The Manuscript</h1>
</div>
<div class="flex items-center gap-4">
<img alt="Julian Reed" class="w-10 h-10 rounded-full object-cover silk-border" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaZK7i0mbzTpcynv8QzGxhdz1T7pTRRuELIzNQWGHSxpl0fv4U-hUixwO0U9fwOcLe6CHEvDTE909LbY_S4FovfIvN6lm-OZl2k3bbkfRAJ3bqjhBIzQ-soi26keCLTtP3Zy9xsQFEDQ7PasxGTY27rQKG5W9aiBcn-rl54rNZotIs1KD1KGclYp9BS23OhmKBBIC1lzCEUyhTK7TjzcLCYGjWaHxEpgqCPodHdMIymkI83JieZs7-O0VXTyy1UuFf13AXbY7j2IjJ"/>
</div>
</div>
</header>
<main class="pt-28 pb-36 px-6 max-w-2xl mx-auto space-y-10">
<!-- User Profile Header Section -->
<section class="flex flex-col items-center text-center space-y-6">
<div class="relative">
<div class="absolute inset-0 bg-white/40 blur-2xl rounded-full"></div>
<img alt="Julian Reed" class="relative w-28 h-28 rounded-full object-cover silk-border shadow-xl ring-4 ring-white/30" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgx8X_OQ26hLA6WTJVCOqvWuEpSCpxl9xsL8hXaAJipmb7U6_4LdoNRqHwLscwULANsYtpL0YlhLWqrlDX3t8u9o4tMdCUDRXTEA-O_df-ZkrPFluf-HKN686PVnI8-L1aRw8PJ5kz4ry46zbxJf5p6uM9DD78--PrsvmJyP0AJO9HEUJYUQM7m945kgv9Np-0cevLfV6o9ytDyvK4IsUiuiEkJqc0_Y42dQJaID9t-COWj-LZ-smQopASp3FysUORkYeGwNQ9PYtQ"/>
</div>
<div class="space-y-2">
<h2 class="font-headline text-4xl text-on-surface tracking-tight font-medium">Julian Reed</h2>
<div class="inline-flex items-center px-5 py-1.5 glass-pill">
<span class="material-symbols-outlined text-[16px] mr-2" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-label uppercase tracking-[0.15em] text-[10px] font-bold text-on-surface-variant">Premium Member</span>
</div>
</div>
</section>
<!-- Reading Statistics Section -->
<section class="grid grid-cols-1 gap-4">
<div class="glass-pill p-6 flex items-center justify-between px-10">
<div class="flex flex-col">
<span class="font-label uppercase tracking-widest text-[10px] text-on-surface-variant font-bold">Summaries Read</span>
<span class="font-headline text-3xl text-primary mt-1">142</span>
</div>
<div class="h-10 w-[1px] bg-outline-variant/20"></div>
<div class="flex flex-col text-right">
<span class="font-label uppercase tracking-widest text-[10px] text-on-surface-variant font-bold">Sources Saved</span>
<span class="font-headline text-3xl text-primary mt-1">56</span>
</div>
</div>
</section>
<!-- Preferences & Security Section -->
<section class="space-y-6">
<h3 class="font-headline italic text-2xl px-6 text-on-surface">Preferences &amp; Security</h3>
<div class="space-y-4">
<!-- Action Items as Pill Glass Cards -->
<button class="w-full flex items-center justify-between p-4 glass-pill group hover:bg-white/60 transition-all duration-500">
<div class="flex items-center gap-5 ml-2">
<div class="bg-surface-container p-2.5 rounded-full text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined">payments</span>
</div>
<span class="font-body text-[1rem] font-medium text-on-surface">Manage Subscription</span>
</div>
<span class="material-symbols-outlined text-outline-variant mr-2 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 glass-pill group hover:bg-white/60 transition-all duration-500">
<div class="flex items-center gap-5 ml-2">
<div class="bg-surface-container p-2.5 rounded-full text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined">hub</span>
</div>
<span class="font-body text-[1rem] font-medium text-on-surface">Connected Accounts</span>
</div>
<span class="material-symbols-outlined text-outline-variant mr-2 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 glass-pill group hover:bg-white/60 transition-all duration-500">
<div class="flex items-center gap-5 ml-2">
<div class="bg-surface-container p-2.5 rounded-full text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined">verified_user</span>
</div>
<span class="font-body text-[1rem] font-medium text-on-surface">Privacy Settings</span>
</div>
<span class="material-symbols-outlined text-outline-variant mr-2 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
</section>
<!-- Sign Out Button -->
<footer class="pt-8 flex justify-center pb-8">
<button class="px-12 py-4 bg-primary text-on-primary rounded-full font-label uppercase tracking-[0.2em] text-[11px] font-bold shadow-lg hover:bg-primary-dim active:scale-95 transition-all duration-300">
            Sign Out of Account
        </button>
</footer>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-6 w-full flex justify-center z-50 px-4">
<div class="bg-stone-50/70 dark:bg-stone-900/70 backdrop-blur-xl w-[90%] max-w-md rounded-[3rem] border border-white/20 shadow-[0_16px_32px_rgba(49,51,43,0.08)] flex justify-between items-center p-2">
<button class="text-stone-500 dark:text-stone-400 p-3 hover:scale-110 transition-transform">
<span class="material-symbols-outlined">auto_stories</span>
</button>
<button class="text-stone-500 dark:text-stone-400 p-3 hover:scale-110 transition-transform">
<span class="material-symbols-outlined">explore</span>
</button>
<button class="text-stone-500 dark:text-stone-400 p-3 hover:scale-110 transition-transform">
<span class="material-symbols-outlined">bookmarks</span>
</button>
<button class="bg-stone-800 dark:bg-stone-100 text-stone-50 dark:text-stone-900 rounded-full p-3 shadow-lg hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
</button>
</div>
</nav>
</body></html>
