services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: curator-api
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: curator-dev-only
      DATABASE_URL: postgresql://curator:curator@postgres:5432/curator
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./api:/app

  postgres:
    image: postgres:16-alpine
    container_name: curator-postgres
    environment:
      POSTGRES_DB: curator
      POSTGRES_USER: curator
      POSTGRES_PASSWORD: curator
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U curator -d curator
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - curator-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: curator-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - curator-redis-data:/data

  celery:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: curator-celery
    command: celery -A config worker -l INFO
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://curator:curator@postgres:5432/curator
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./api:/app

volumes:
  curator-postgres-data:
  curator-redis-data:
